<!DOCTYPE html>
<html lang="nl">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interflon Lagertypes Wijzer</title>
  
  <!-- Typography & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary-blue: #0A2540;
      --accent-red: #E30613;
      --accent-red-hover: #C0050F;
      --accent-yellow: #FFC000;
      --accent-yellow-light: #FFF9E6;
      --accent-yellow-border: #FFE0B2;
      --accent-yellow-border-soft: rgba(255, 192, 0, 0.2);
      
      --bg-main: #F4F6F9;
      --bg-card: #FFFFFF;
      --text-dark: #1E293B;
      --text-medium: #64748B;
      --text-light: #94A3B8;
      
      --border-color: #E2E8F0;
      --border-radius-sm: 8px;
      --border-radius-md: 12px;
      --border-radius-lg: 20px;
      
      --shadow-sm: 0 2px 4px rgba(10, 37, 64, 0.05);
      --shadow-md: 0 10px 15px -3px rgba(10, 37, 64, 0.08), 0 4px 6px -2px rgba(10, 37, 64, 0.03);
      --shadow-lg: 0 20px 25px -5px rgba(10, 37, 64, 0.1), 0 10px 10px -5px rgba(10, 37, 64, 0.04);
      --shadow-glow-blue: 0 0 15px rgba(10, 37, 64, 0.15);
      
      --transition-fast: 0.2s ease;
      --transition-normal: 0.3s ease;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--bg-main);
      color: var(--text-dark);
      line-height: 1.6;
      padding: 40px 20px;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    /* Header section */
    header {
      background-color: var(--bg-card);
      border-radius: var(--border-radius-lg);
      padding: 30px;
      border: 1px solid var(--accent-yellow-border-soft);
      box-shadow: var(--shadow-sm);
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
      gap: 20px;
    }
    
    .logo-container img {
      height: 45px;
      object-fit: contain;
    }
    
    .header-text h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 28px;
      font-weight: 800;
      color: var(--primary-blue);
      margin-bottom: 5px;
    }
    
    .header-text p {
      color: var(--text-medium);
      font-size: 15px;
    }
    
    /* Language Toggle */
    .lang-toggle {
      display: flex;
      gap: 5px;
      background: var(--bg-main);
      padding: 4px;
      border-radius: 30px;
      border: 1px solid var(--border-color);
    }
    
    .lang-btn {
      border: none;
      background: transparent;
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      border-radius: 20px;
      color: var(--text-medium);
      font-family: 'Outfit', sans-serif;
      transition: all var(--transition-fast);
    }
    
    .lang-btn.active {
      background: var(--primary-blue);
      color: white;
    }
    
    /* Search and Filters */
    .filters-section {
      background: var(--bg-card);
      border-radius: var(--border-radius-md);
      padding: 20px;
      border: 1px solid var(--border-color);
      box-shadow: var(--shadow-sm);
      margin-bottom: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    
    .search-box {
      position: relative;
      flex: 1;
      max-width: 450px;
      min-width: 250px;
    }
    
    .search-box input {
      width: 100%;
      padding: 12px 20px 12px 48px;
      font-size: 14px;
      border-radius: 30px;
      border: 1.5px solid var(--border-color);
      background-color: var(--bg-main);
      font-family: 'Plus Jakarta Sans', sans-serif;
      transition: all var(--transition-fast);
    }
    
    .search-box input:focus {
      outline: none;
      border-color: var(--primary-blue);
      background-color: white;
      box-shadow: var(--shadow-glow-blue);
    }
    
    .search-box svg {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      color: var(--text-medium);
    }
    
    .filter-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    
    .filter-btn {
      border: 1px solid var(--border-color);
      background: var(--bg-card);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      color: var(--text-medium);
      transition: all var(--transition-fast);
    }
    
    .filter-btn:hover, .filter-btn.active {
      border-color: var(--primary-blue);
      color: var(--primary-blue);
      background-color: rgba(10, 37, 64, 0.04);
    }
    
    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 25px;
    }
    
    /* Card design */
    .bearing-card {
      background: var(--bg-card);
      border-radius: var(--border-radius-lg);
      border: 1px solid var(--border-color);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform var(--transition-normal), box-shadow var(--transition-normal), border-color var(--transition-normal);
    }
    
    .bearing-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-md);
      border-color: var(--accent-yellow-border);
    }
    
    .card-header {
      padding: 16px 20px;
      background: linear-gradient(135deg, #FAFBFD 0%, #F1F4F9 100%);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    .card-title-area h3 {
      font-family: 'Outfit', sans-serif;
      font-size: 17px;
      font-weight: 700;
      color: var(--primary-blue);
    }
    
    .card-category {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 700;
      color: var(--text-light);
    }
    
    /* Image Section in Card - full width */
    .card-img-block {
      width: 100%;
      height: 140px;
      background-color: white;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
      overflow: hidden;
    }
    
    .card-img-block img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    
    .card-body {
      padding: 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 15px;
    }
    
    /* Metrics / Indicators */
    .metrics-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }
    
    .metric-box {
      flex: 1;
      background: var(--bg-main);
      padding: 10px;
      border-radius: var(--border-radius-sm);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    
    .metric-label {
      font-size: 10px;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--text-medium);
      margin-bottom: 6px;
    }
    
    .badge {
      font-size: 12px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 12px;
      font-family: 'Outfit', sans-serif;
    }
    
    .badge-high {
      background-color: rgba(239, 68, 68, 0.1);
      color: #EF4444;
    }
    
    .badge-medium {
      background-color: rgba(245, 158, 11, 0.1);
      color: #F59E0B;
    }
    
    .badge-low {
      background-color: rgba(16, 185, 129, 0.1);
      color: #10B981;
    }
    
    .direction-badge {
      background-color: rgba(10, 37, 64, 0.06);
      color: var(--primary-blue);
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 12px;
    }
    
    /* Footer */
    footer {
      margin-top: 50px;
      border-top: 1px solid var(--border-color);
      padding-top: 30px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }
    
    .footer-logo img {
      height: 35px;
      object-fit: contain;
    }
    
    .footer-text {
      font-size: 12px;
      color: var(--text-light);
    }
    
    /* Legend area in header or sidebar */
    .legend-box {
      background: #FAFBFD;
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius-md);
      padding: 15px 25px;
      margin-bottom: 30px;
      display: flex;
      justify-content: space-around;
      flex-wrap: wrap;
      gap: 20px;
      font-size: 12.5px;
      color: var(--text-medium);
    }
    
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    /* No results state */
    .no-results {
      background: var(--bg-card);
      border-radius: var(--border-radius-lg);
      border: 1.5px dashed var(--border-color);
      padding: 50px;
      text-align: center;
      display: none;
      width: 100%;
    }
    
    .no-results svg {
      width: 64px;
      height: 64px;
      color: var(--text-light);
      margin-bottom: 15px;
    }
    
    @media (max-width: 768px) {
      body {
        padding: 20px 10px;
      }
      
      header {
        flex-direction: column;
        text-align: center;
        padding: 20px;
      }
      
      .filters-section {
        flex-direction: column;
        align-items: stretch;
      }
      
      .filter-buttons {
        justify-content: center;
      }
      
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

        names: {
          nl: "CARB® Toroïdaal rollager",
          en: "CARB® toroidal roller bearing",
          fr: "Roulement toroïdal CARB®"
        },
        direction: "dirRadialSelfAligning",
        load: "magHigh",
        speed: "spdMedium"
      },
      {
        id: "insert_ball",
        category: "ball",
        img: "crop-insert-ball.png",
        names: {
          nl: "Instelbaar kogellager (Y-lager)",
          en: "Insert ball bearing",
          fr: "Roulement d'insertion à billes"
        },
        direction: "dirRadialSelfAligning",
        load: "magMedium",
        speed: "spdMedium"
      }
    ];

    let currentLang = "nl";
    let currentCategory = "all";

    // Initialize Page
    function init() {
      // Get URL language parameter
      const params = new URLSearchParams(window.location.search);
      const urlLang = params.get('lang');
      if (urlLang && (urlLang === 'nl' || urlLang === 'en' || urlLang === 'fr')) {
        currentLang = urlLang;
      }
      
      updateLanguageSelector();
      translateUI();
      renderGrid();
    }

    function changeLanguage(lang) {
      currentLang = lang;
      updateLanguageSelector();
      translateUI();
      renderGrid();
      
      // Update URL parameters without reloading
      const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?lang=' + lang;
      window.history.pushState({path:newUrl},'',newUrl);
    }

    function updateLanguageSelector() {
      document.querySelectorAll(".lang-btn").forEach(btn => {
        btn.classList.remove("active");
        if (btn.textContent.toLowerCase() === currentLang) {
          btn.classList.add("active");
        }
      });
    }

    function translateUI() {
      const dict = TRANSLATIONS[currentLang];
      
      // Text translations
      document.getElementById("mainTitle").textContent = dict.mainTitle;
      document.getElementById("mainSubtitle").textContent = dict.mainSubtitle;
      document.getElementById("searchInput").placeholder = dict.searchPlaceholder;
      document.getElementById("lblLegendBelastingen").textContent = dict.lblLegendBelastingen;
      document.getElementById("lblLegendToerentallen").textContent = dict.lblLegendToerentallen;
      
      document.getElementById("lblZwaar").textContent = dict.lblZwaar;
      document.getElementById("lblMiddelgroot").textContent = dict.lblMiddelgroot;
      document.getElementById("lblLaag").textContent = dict.lblLaag;
      document.getElementById("lblHoog2").textContent = dict.lblHoog2;
      document.getElementById("lblMiddelgroot2").textContent = dict.lblMiddelgroot2;
      document.getElementById("lblLaag2").textContent = dict.lblLaag2;
      
      document.getElementById("btnFilterAll").textContent = dict.btnFilterAll;
      document.getElementById("btnFilterBall").textContent = dict.btnFilterBall;
      document.getElementById("btnFilterRoller").textContent = dict.btnFilterRoller;
      document.getElementById("btnFilterThrust").textContent = dict.btnFilterThrust;
      
      document.getElementById("lblNoResultsTitle").textContent = dict.lblNoResultsTitle;
      document.getElementById("lblNoResultsDesc").textContent = dict.lblNoResultsDesc;
      document.getElementById("lblFooterText").textContent = dict.lblFooterText;
    }

    function setCategoryFilter(category) {
      currentCategory = category;
      document.querySelectorAll(".filter-btn").forEach(btn => {
        btn.classList.remove("active");
      });
      
      if (category === 'all') document.getElementById("btnFilterAll").classList.add("active");
      if (category === 'ball') document.getElementById("btnFilterBall").classList.add("active");
      if (category === 'roller') document.getElementById("btnFilterRoller").classList.add("active");
      if (category === 'thrust') document.getElementById("btnFilterThrust").classList.add("active");
      
      renderGrid();
    }

    function filterBearings() {
      renderGrid();
    }

    function renderGrid() {
      const grid = document.getElementById("bearingsGrid");
      const noResults = document.getElementById("noResultsState");
      const searchVal = document.getElementById("searchInput").value.toLowerCase();
      const dict = TRANSLATIONS[currentLang];
      
      grid.innerHTML = "";
      
      // Filter data
      const filtered = BEARINGS_DATA.filter(item => {
        const matchesCategory = currentCategory === 'all' || item.category === currentCategory;
        const nameTranslated = item.names[currentLang].toLowerCase();
        return matchesCategory && nameTranslated.includes(searchVal);
      });
      
      if (filtered.length === 0) {
        grid.style.display = "none";
        noResults.style.display = "block";
        return;
      }
      
      grid.style.display = "grid";
      noResults.style.display = "none";
      
      filtered.forEach(item => {
        const card = document.createElement("div");
        card.className = "bearing-card";
        
        // Determine badges and colors
        let loadText = dict.magMedium;
        let loadClass = "badge-medium";
        if (item.load === 'magHigh') { loadText = dict.magHigh; loadClass = "badge-high"; }
        if (item.load === 'magLow') { loadText = dict.magLow; loadClass = "badge-low"; }
        
        let speedText = dict.spdMedium;
        let speedClass = "badge-medium";
        if (item.speed === 'spdHigh') { speedText = dict.spdHigh; speedClass = "badge-high"; }
        if (item.speed === 'spdLow') { speedText = dict.spdLow; speedClass = "badge-low"; }
        
        const directionText = dict[item.direction];
        const categoryText = dict['cat' + item.category.charAt(0).toUpperCase() + item.category.slice(1)];
        
        card.innerHTML = `
          <div class="card-header">
            <span class="card-category">${categoryText}</span>
            <h3>${item.names[currentLang]}</h3>
          </div>
          <div class="card-img-block">
            <img src="${item.img}?v=7" alt="${item.names[currentLang]}" onerror="this.src='bearing-dimensions.jpg'">
          </div>
          <div class="card-body">
            <div class="metrics-row">
              <div class="metric-box">
                <span class="metric-label">${dict.lblDirection}</span>
                <span class="direction-badge">${directionText}</span>
              </div>
              <div class="metric-box">
                <span class="metric-label">${dict.lblLoad}</span>
                <span class="badge ${loadClass}">${loadText}</span>
              </div>
              <div class="metric-box">
                <span class="metric-label">${dict.lblSpeed}</span>
                <span class="badge ${speedClass}">${speedText}</span>
              </div>
            </div>
          </div>
        `;
        
        grid.appendChild(card);
      });
    }

    // Initialize on load
    window.onload = init;
  </script>
</body>
</html>
